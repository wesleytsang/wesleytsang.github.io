<div class="trades-view">
  <div class="view-header">
    <h1>Trades</h1>
    <button ng-click="vm.refresh()">↻ Refresh</button>
  </div>

  <div ng-if="vm.loading" class="loading">Loading…</div>
  <div ng-if="vm.error" class="error">{{ vm.error }}</div>

  <div
    id="tradesGrid"
    class="ag-theme-alpine"
    style="width: 100%; height: 500px;"
  ></div>
</div>
