# ──────────────────────────────────────────────
# CATS Trading Engine — Configuration
# Copy this file to config.yaml and fill in your values.
# NEVER commit config.yaml — it may contain secrets.
# ──────────────────────────────────────────────

exchange:
  name: binance          # Exchange ID as recognised by CCXT
  api_key: ""            # Override via EXCHANGE_API_KEY env var
  api_secret: ""         # Override via EXCHANGE_API_SECRET env var
  sandbox: true          # Use exchange testnet

engine:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"      # DEBUG | INFO | WARNING | ERROR

trading:
  symbols:               # Symbols to watch / trade
    - BTC/USDT
    - ETH/USDT
  base_currency: USDT
  order_size: 10         # Order size in base_currency units
  max_open_trades: 3

signals:
  poll_interval_seconds: 60
  indicators:
    rsi_period: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
